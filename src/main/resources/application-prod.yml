server:
  port: 8080

spring:
  datasource:
    url: jdbc:pos****************place_db_qa
    username: m****
    password: mys******rd
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: public

  security:
    oauth2:
      resourceserver:
        jwt:
          # RHSSO Keycloak realm issuer — backend validates incoming tokens against this.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://rhsso.azercell.com/auth/realms/marketplace}


logging:
  level:
    root: INFO
    com.azercell.marketplace: DEBUG


app:
  base-url: http://localhost:8080
  cors:
    # Comma-separated browser origins allowed to call the API. Override via CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://marketplace.azercell.com}
