server:
  port: 8080
  # Honor X-Forwarded-* from the TLS proxy/load balancer so Spring knows the real https host.
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace_db_qa
    username: myuser
    password: mysecretpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: public

  security:
    oauth2:
      resourceserver:
        jwt:
          # RHBK (Keycloak) realm issuer — must match the token's `iss` claim byte-for-byte.
          # Local RHBK start-dev serves plain HTTP and has no /auth path.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/marketplace}

logging:
  level:
    root: INFO
    com.azercell.marketplace: DEBUG

app:
  # App's own public URL; drives generated image URLs. Override via APP_BASE_URL.
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    # Allow all origins (safe here because auth is Bearer-token, allowCredentials=false — not cookies).
    # TEMPORARY: lock this down to the real frontend host(s) via CORS_ALLOWED_ORIGINS before go-live.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  storage:
    # Product images go to S3 in qa/prod. Credentials come from the AWS chain
    # (env AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY, or an instance/role profile) — never put them here.
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:eu-central-1}
      key-prefix: ${S3_KEY_PREFIX:products/images/}
      # Optional CloudFront/CDN base; when empty, the raw S3 URL is used.
      public-base-url: ${S3_PUBLIC_BASE_URL:}
