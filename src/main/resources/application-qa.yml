server:
  port: 8080
  # Honor X-Forwarded-* from the TLS proxy/load balancer so Spring knows the real https host.
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://pgdbtes**********e_db_qa
    username: my*****er
    password: mys*******d
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: public

  security:
    oauth2:
      resourceserver:
        jwt:
          # RHSSO Keycloak realm issuer — backend validates incoming tokens against this.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://rhsso-qa.azercell.com/auth/realms/marketplace}

logging:
  level:
    root: INFO
    com.azercell.marketplace: DEBUG

app:
  # App's own public URL; drives generated image URLs. Override via APP_BASE_URL.
  base-url: ${APP_BASE_URL:https://marketplace-qa.azercell.com}
  cors:
    # Comma-separated browser origins allowed to call the API. Override via CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://marketplace-qa.azercell.com}
